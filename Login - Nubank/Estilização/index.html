<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nubank</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class=" container">
        <form class="estrutura">
            <h1> Faça seu login </h1>
               
            <div class="input-box">
                <label for="CPF">CPF</label>
                <input placeholder="Digite seu CPF" id="CPF" type="text" required>
                <i class=" bx bxs-user"></i>
            </div>

            <div class="input-box">
                <label for="password">Senha</label>
                <input placeholder="Digite sua senha" type="password" required>
                <i class=" bx bxs-lock-alt"></i>
            </div>

            <div class="button-continuar">
                <button>CONTINUAR</button>
            </div>

            <div class="remember-forgot">
                <a href="#"><P>Esqueci minha senha</P></a>
            </div>

            <div class="não-cliente">
                <a href="#"><p>Não sou cliente</p></a>
            </div>
    
         </form>
    </main>

</body>
</html>
